name: Publish to PyPI

on:
  release:
    types: [published] # Triggers automatically when you hit "Publish Release" on GitHub

jobs:
  deploy:
    name: Build and Publish to PyPI
    runs-on: ubuntu-latest
    
    # Matches the environment scope defined in your PyPI project parameters
    environment: pypi
    
    permissions:
      id-token: write   # MANDATORY: Allows GitHub to ask PyPI for temporary OIDC tokens
      contents: read    # Allows checking out code

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # CRITICAL: Fetches all history and tags so setuptools-scm knows the version!

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Build System
      run: python -m pip install build

    - name: Build Packaging Artifacts
      run: python -m build

    - name: Secure Upload via Trusted Publisher
      uses: pypa/gh-action-pypi-publish@release/v1